<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <title>AChat Redirect</title>
    <script>
      (function () {
        var base = "/AChat";
        var redirectTarget =
          base +
          (window.location.pathname || "").replace(base, "") +
          (window.location.search || "") +
          (window.location.hash || "");
        sessionStorage.setItem("achat_redirect", redirectTarget || base + "/");
        window.location.replace(base + "/");
      })();
    </script>
  </head>
  <body></body>
</html>
